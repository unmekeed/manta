# CI-конвейер монорепозитория (Гл. 10.4 спецификации).
# Фаза 1: lint + unit-тесты Go-сервисов, валидация схем.
# Последующие фазы добавят contract-tests, сборку образов, подпись и SBOM.
name: ci-cd-pipeline

on:
  push:
  pull_request:


jobs:
  go-lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, replay-parser/svc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/${{ matrix.service }}/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: apps/${{ matrix.service }}
      - name: Test
        run: go test -race -cover ./...
        working-directory: apps/${{ matrix.service }}
      - name: Build
        run: go build ./...
        working-directory: apps/${{ matrix.service }}

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [feature-extractor, ml-service, report-generator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test
        run: |
          pip install pytest -r apps/${{ matrix.service }}/requirements.txt
          pytest apps/${{ matrix.service }}/tests -q

  cpp-parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install snappy
        run: sudo apt-get update && sudo apt-get install -y libsnappy-dev
      - name: Configure
        run: cmake -B build -S apps/replay-parser -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j4
      - name: Test
        run: ctest --test-dir build --output-on-failure

  schemas-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas parse
        run: |
          python3 - <<'EOF'
          import json, glob, sys
          files = glob.glob("libs/schemas/*.json")
          assert files, "no schemas found"
          for f in files:
              json.load(open(f))
              print("OK", f)
          EOF
      - name: Validate compose file
        run: docker compose -f deployments/docker-compose.yml config -q
