# MinIO — S3-хранилище реплеев и реестра моделей (Гл. 12.1, ns data).
# Production — управляемый S3/объектное хранилище облака.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  clusterIP: None
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000 }
    - { name: console, port: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: data
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: dota }
            - { name: MINIO_ROOT_PASSWORD, value: dota_dev_password }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 1Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 20Gi } }
