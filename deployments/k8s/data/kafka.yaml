# Kafka KRaft (Гл. 12.1, ns data). Dev-grade single-node (как в compose);
# production — Strimzi-оператор с 3 брокерами.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: data
spec:
  clusterIP: None
  selector: { app: kafka }
  ports:
    - { name: broker, port: 9092 }
    - { name: controller, port: 29093 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: data
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: broker,controller }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS,
                value: 1@kafka-0.kafka.data.svc:29093 }
            - { name: KAFKA_LISTENERS,
                value: PLAINTEXT://:9092,CONTROLLER://:29093 }
            - { name: KAFKA_ADVERTISED_LISTENERS,
                value: PLAINTEXT://kafka.data.svc:9092 }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP,
                value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: CONTROLLER }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: PLAINTEXT }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "false" }
          ports:
            - { containerPort: 9092 }
            - { containerPort: 29093 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1", memory: 2Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
