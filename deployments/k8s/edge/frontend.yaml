# Frontend SPA (Гл. 8, ns edge): nginx со статикой, /api проксирует на
# api-gateway (тот же неймспейс — короткое DNS-имя из nginx.conf работает).
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: edge
spec:
  selector: { app: frontend }
  ports:
    - { name: http, port: 80 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edge
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: registry.local/manta/frontend:latest  # kustomize images
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
