# API Gateway (Гл. 3.1, ns edge).
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edge
spec:
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edge
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: registry.local/manta/api-gateway:latest  # kustomize images
          envFrom:
            - configMapRef: { name: manta-env }
            - secretRef: { name: manta-secrets }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
