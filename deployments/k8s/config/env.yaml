# Общее окружение приложений (аналог &app-env из docker-compose).
# ConfigMap/Secret неймспейсные — по копии в edge/ingest/ml (якоря YAML не
# работают между документами, поэтому копии развёрнуты явно).
# Секреты здесь — DEV-значения (те же, что в compose); в production
# заменяются SealedSecrets/ExternalSecrets, НЕ коммитятся.
#
# Внутрикластерные адреса — FQDN сервисов неймспейса data.

apiVersion: v1
kind: ConfigMap
metadata:
  name: manta-env
  namespace: edge
data:
  KAFKA_BROKERS: kafka.data.svc:9092
  S3_ENDPOINT: minio.data.svc:9000
  CLICKHOUSE_URL: http://clickhouse.data.svc:8123
  CLICKHOUSE_DB: manta
  CLICKHOUSE_USER: dota
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manta-env
  namespace: ingest
data:
  KAFKA_BROKERS: kafka.data.svc:9092
  S3_ENDPOINT: minio.data.svc:9000
  CLICKHOUSE_URL: http://clickhouse.data.svc:8123
  CLICKHOUSE_DB: manta
  CLICKHOUSE_USER: dota
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manta-env
  namespace: ml
data:
  KAFKA_BROKERS: kafka.data.svc:9092
  S3_ENDPOINT: minio.data.svc:9000
  CLICKHOUSE_URL: http://clickhouse.data.svc:8123
  CLICKHOUSE_DB: manta
  CLICKHOUSE_USER: dota
---
apiVersion: v1
kind: Secret
metadata:
  name: manta-secrets
  namespace: edge
type: Opaque
stringData:
  POSTGRES_DSN: postgresql://dota:dota_dev_password@postgres.data.svc:5432/manta
  S3_ACCESS_KEY: dota
  S3_SECRET_KEY: dota_dev_password
  CLICKHOUSE_PASSWORD: dota_dev_password
---
apiVersion: v1
kind: Secret
metadata:
  name: manta-secrets
  namespace: ingest
type: Opaque
stringData:
  POSTGRES_DSN: postgresql://dota:dota_dev_password@postgres.data.svc:5432/manta
  S3_ACCESS_KEY: dota
  S3_SECRET_KEY: dota_dev_password
  CLICKHOUSE_PASSWORD: dota_dev_password
---
apiVersion: v1
kind: Secret
metadata:
  name: manta-secrets
  namespace: ml
type: Opaque
stringData:
  POSTGRES_DSN: postgresql://dota:dota_dev_password@postgres.data.svc:5432/manta
  S3_ACCESS_KEY: dota
  S3_SECRET_KEY: dota_dev_password
  CLICKHOUSE_PASSWORD: dota_dev_password
---
# Опциональные интеграции ml-неймспейса: Telegram-уведомления автотрейна
# и LLM-нарратив. Пустые значения = функции выключены (graceful degradation).
apiVersion: v1
kind: Secret
metadata:
  name: manta-integrations
  namespace: ml
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  ANTHROPIC_API_KEY: ""
